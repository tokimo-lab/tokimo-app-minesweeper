# Tokimo monorepo pre-commit hooks (Lefthook)
pre-commit:
  parallel: true
  commands:
    rustfmt:
      tags: rust fmt
      glob: "*.rs"
      run: scripts/lefthook-rustfmt.sh {staged_files}
      stage_fixed: true

    biome:
      tags: web fmt
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,css}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        pnpm exec biome format --write --no-errors-on-unmatched $files
      stage_fixed: true

pre-push:
  commands:
    fmt-check:
      run: cargo fmt -p tokimo-app-minesweeper -- --check
    clippy:
      run: cargo clippy -p tokimo-app-minesweeper --lib --bins -- -D warnings
